<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDX Paper Trading Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">TDX PAPER TRADING</p>
        <h1>只读模拟交易看板</h1>
      </div>
      <div class="status-cluster">
        <div>
          <span class="label">市场</span>
          <strong id="marketStatus">--</strong>
        </div>
        <div>
          <span class="label">更新</span>
          <strong id="updatedAt">--</strong>
        </div>
      </div>
    </header>

    <section id="emptyState" class="empty-state" hidden>
      <p class="eyebrow">NO PAPER ACCOUNT</p>
      <h2>还没有模拟账户</h2>
      <p>当前看板处于只读状态。创建账户和下单仍由 API 或 Agent 工具完成。</p>
    </section>

    <section class="account-grid" id="accountCards" aria-label="账户卡片"></section>

    <section class="layout-main">
      <article class="panel chart-panel" data-expand>
        <div class="panel-head">
          <div>
            <p class="eyebrow">EQUITY CURVE</p>
            <h2>资产曲线</h2>
          </div>
          <span id="curveRange">20d</span>
        </div>
        <canvas id="equityCanvas" width="900" height="300"></canvas>
        <div id="curveTooltip" class="curve-tooltip" hidden></div>
      </article>

      <article class="panel" data-expand>
        <div class="panel-head">
          <div>
            <p class="eyebrow">A-SHARE MARKET</p>
            <h2>A股市场概览</h2>
          </div>
        </div>
        <div class="metric-stack" id="marketOverview"></div>
      </article>
    </section>

    <section class="data-grid">
      <article class="panel" data-expand>
        <div class="panel-head">
          <div>
            <p class="eyebrow">POSITIONS</p>
            <h2>当前持仓</h2>
          </div>
          <span id="positionCount">0</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>标的</th>
                <th>数量</th>
                <th>可卖</th>
                <th>均价</th>
              </tr>
            </thead>
            <tbody id="positionsBody"></tbody>
          </table>
        </div>
      </article>

      <article class="panel" data-expand>
        <div class="panel-head">
          <div>
            <p class="eyebrow">ORDERS & TRADES</p>
            <h2>委托与成交</h2>
          </div>
        </div>
        <div id="ordersTrades" class="compact-list"></div>
      </article>

      <article class="panel" data-expand>
        <div class="panel-head">
          <div>
            <p class="eyebrow">CLOSED</p>
            <h2>清仓后表现</h2>
          </div>
          <span>60d</span>
        </div>
        <div id="closedPositions" class="compact-list"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">AGENT ACTIVITY</p>
            <h2>Agent 行为时间线</h2>
          </div>
          <span id="activityCount">0</span>
        </div>
        <ol id="activityTimeline" class="timeline"></ol>
      </article>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
